<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
     <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-sphere position="0 3.25 -5" radius="1" color="#00000"></a-sphere>
      <a-sphere position="0 1.25 -5" radius="1.25" color="#00000"></a-sphere>
      <a-sphere position="0 5 -5" radius="0.75" color="#00000"></a-sphere>
      <a-sphere position="0.75 5 -5" radius="0.15" color="#000000"></a-sphere>
      <a-sphere position="-0.75 5 -5" radius="0.15" color="#000000"></a-sphere>
      <a-sphere position="0.15 1.5 -6.25" radius="0.15" color="#000000"></a-sphere>
      <a-sphere position="0.15 3.5 -6" radius="0.15" color="#000000"></a-sphere>

      <a-cone src="" height="8" radius-top="0.1" position="0 5 -9.5" rotation="-90 0 0" color="#000000"></a-cone>

      <a-plane position="0 0.1 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4"></a-plane>
      <!-- <a-sky color="#ECECEC"></a-sky> -->
      <!-- the enviroment entity includes a sky. Choose from the presets"none, default, contact, egypt, checkerboard, forest, goaland, yavapai, goldmine, threetowers, poison, arches, tron, japan, dream, volcano, starry, osiris, moon" -->
      <a-entity environment="preset: japan; dressingAmount: 500"></a-entity>
    </a-scene>
  </body>
</html>
