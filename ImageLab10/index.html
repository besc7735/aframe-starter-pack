<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
    <a-scene>
    <a-assets>
      <img id="sky" src="assets/sky.jpeg">
      <img id="cone" src="assets/cone.jpg">
      <img id="icecream" src="assets/icecream.jpg">
      <img id="sandcastle" src="assets/sandcastle.jpeg">
    </a-assets>

      <a-box position="-1 0.5 -3" rotation="0 45 0" src="#sandcastle"></a-box>
      <a-cone position="-1 1.5 -3" rotation="0 0 0" radius="1" height="1" color="#FFC65D"></a-cone>
      <a-sphere position="1 2 -3" radius="0.85" color="#654321"></a-sphere>
      <a-sphere position="1 3 -3" radius="0.85" src="#icecream"></a-sphere>
      <a-cone position="1 0.75 -3" rotation="-180 0 0" radius="0.5" height="1.5" src="#cone"></a-cone>
      <a-sky src="#sky"></a-sky>
    </a-scene>
  </body>
</html>
